apiVersion: apps/v1
kind: Deployment
metadata:
  name: testbed-payment
  namespace: rca-testbed
  labels:
    app: testbed-payment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testbed-payment
  template:
    metadata:
      labels:
        app: testbed-payment
    spec:
      containers:
        - name: payment-service
          image: plopvape-payment:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: service-config
            - secretRef:
                name: postgres-secret
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: testbed-payment
  namespace: rca-testbed
spec:
  selector:
    app: testbed-payment
  ports:
    - port: 8083
      targetPort: 8083
